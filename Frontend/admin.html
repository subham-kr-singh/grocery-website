<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | QuickGrab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2d6a4f',
                        'primary-light': '#40916c',
                        accent: '#d8f3dc'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <!-- Admin Navigation -->
    <nav class="bg-gray-900 text-white sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2">
                    <i class="ph-fill ph-basket text-3xl text-primary-light"></i>
                    <a href="index.html" class="brand-font font-bold text-2xl tracking-tight">Quick<span class="text-primary-light">Grab</span> <span class="text-xs font-mono bg-purple-600 text-white px-2 py-0.5 rounded ml-2 align-middle">ADMIN</span></a>
                </div>
                
                <div class="flex items-center gap-6">
                    <button onclick="switchTab('orders')" id="tab-orders" class="text-sm font-medium hover:text-primary-light transition-colors text-primary-light">Orders</button>
                    <button onclick="switchTab('products')" id="tab-products" class="text-sm font-medium hover:text-primary-light transition-colors">Products</button>
                    <a href="index.html" class="text-sm font-medium text-gray-400 hover:text-white transition-colors ml-4 border-l border-gray-700 pl-4">Storefront</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        
        <!-- Orders View -->
        <div id="view-orders" class="animate-fade-in">
            <h1 class="text-2xl font-bold text-gray-900 mb-6 brand-font">All Orders</h1>
            
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Order ID</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Customer</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Date</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Total</th>
                                <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="orders-tbody" class="bg-white divide-y divide-gray-200">
                            <tr><td colspan="6" class="px-6 py-10 text-center text-gray-500"><div class="loader inline-block"></div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Products View -->
        <div id="view-products" class="hidden animate-fade-in">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold text-gray-900 brand-font">Manage Products</h1>
                <button onclick="alert('Feature coming soon!')" class="inline-flex items-center justify-center py-2 px-4 rounded-xl text-sm font-medium text-white bg-primary hover:bg-primary-light transition-colors">
                    <i class="ph ph-plus mr-2"></i> Add Product
                </button>
            </div>
            
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Product</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Category</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Price</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Stock</th>
                                <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="products-tbody" class="bg-white divide-y divide-gray-200">
                            <tr><td colspan="5" class="px-6 py-10 text-center text-gray-500"><div class="loader inline-block"></div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = AuthAPI.getCurrentUser();
            if (!user || user.role !== 'admin') {
                document.body.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center bg-gray-50">
                        <div class="text-center">
                            <i class="ph ph-lock-key text-6xl text-red-500 mb-4"></i>
                            <h1 class="text-2xl font-bold text-gray-900 mb-2">Access Denied</h1>
                            <p class="text-gray-500 mb-6">You must be an administrator to view this page.</p>
                            <a href="index.html" class="text-primary font-medium hover:underline">Return to Home</a>
                        </div>
                    </div>
                `;
                return;
            }

            loadOrders();
            loadProducts();
        });

        function switchTab(tab) {
            if(tab === 'orders') {
                document.getElementById('view-orders').classList.remove('hidden');
                document.getElementById('view-products').classList.add('hidden');
                document.getElementById('tab-orders').classList.add('text-primary-light');
                document.getElementById('tab-products').classList.remove('text-primary-light');
            } else {
                document.getElementById('view-products').classList.remove('hidden');
                document.getElementById('view-orders').classList.add('hidden');
                document.getElementById('tab-products').classList.add('text-primary-light');
                document.getElementById('tab-orders').classList.remove('text-primary-light');
            }
        }

        async function loadOrders() {
            try {
                const response = await OrdersAPI.getAll();
                const orders = response.data || response;
                renderOrdersTable(orders);
            } catch (error) {
                document.getElementById('orders-tbody').innerHTML = `<tr><td colspan="6" class="px-6 py-4 text-center text-red-500">Failed to load orders: ${error.message}</td></tr>`;
            }
        }

        async function loadProducts() {
            try {
                const response = await ProductsAPI.getAll();
                const products = response.data || response;
                renderProductsTable(products);
            } catch (error) {
                document.getElementById('products-tbody').innerHTML = `<tr><td colspan="5" class="px-6 py-4 text-center text-red-500">Failed to load products: ${error.message}</td></tr>`;
            }
        }

        function renderOrdersTable(orders) {
            const tbody = document.getElementById('orders-tbody');
            if (!orders || orders.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-8 text-center text-gray-500">No orders found.</td></tr>`;
                return;
            }

            orders.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

            let html = '';
            orders.forEach(order => {
                const date = new Date(order.createdAt).toLocaleDateString();
                // Status values must match backend enum: pending | preparing | ready | collected
                const statusOptions = ['pending', 'preparing', 'ready', 'collected']
                    .map(s => `<option value="${s}" ${order.status === s ? 'selected' : ''}>${s.charAt(0).toUpperCase() + s.slice(1)}</option>`)
                    .join('');

                html += `
                    <tr>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-mono text-gray-900">${order._id.substring(0,8)}...</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${order.user?.name || 'User'}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${date}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm">
                            <select onchange="updateOrderStatus('${order._id}', this.value)" class="text-sm border border-gray-300 rounded-md p-1 focus:ring-primary focus:border-primary">
                                ${statusOptions}
                            </select>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">$${order.totalAmount ? order.totalAmount.toFixed(2) : '0.00'}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                            <button class="text-primary hover:text-primary-light">View</button>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        function renderProductsTable(products) {
            const tbody = document.getElementById('products-tbody');
            if (!products || products.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-gray-500">No products found.</td></tr>`;
                return;
            }

            let html = '';
            products.forEach(product => {
                html += `
                    <tr>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="flex items-center">
                                <div class="flex-shrink-0 h-10 w-10">
                                    <img class="h-10 w-10 rounded-lg object-cover" src="${product.imageURL || `https://source.unsplash.com/100x100/?${product.category}`}" alt="" onerror="this.src='https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&q=80&w=100'">
                                </div>
                                <div class="ml-4">
                                    <div class="text-sm font-medium text-gray-900">${product.name}</div>
                                </div>
                            </div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-gray-100 text-gray-800">
                                ${product.category}
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            $${product.price.toFixed(2)}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            ${product.stockQuantity}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                            <button onclick="deleteProduct('${product._id}')" class="text-red-600 hover:text-red-900 ml-3"><i class="ph ph-trash text-lg"></i></button>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        async function updateOrderStatus(orderId, status) {
            try {
                await OrdersAPI.updateStatus(orderId, status);
                // Optional toast notification
            } catch (error) {
                alert(`Failed to update status: ${error.message}`);
                loadOrders(); // reload to reset dropdown
            }
        }

        async function deleteProduct(productId) {
            if(confirm('Are you sure you want to delete this product?')) {
                try {
                    await ProductsAPI.delete(productId);
                    loadProducts();
                } catch (error) {
                    alert(`Failed to delete: ${error.message}`);
                }
            }
        }
    </script>
</body>
</html>
