<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | QuickGrab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2d6a4f',
                        'primary-light': '#40916c',
                        accent: '#d8f3dc'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <div class="flex-grow flex items-center justify-center p-4 py-12">
        <div class="w-full max-w-md animate-fade-in">
            <div class="text-center mb-8">
                <a href="index.html" class="inline-flex items-center gap-2 mb-4">
                    <i class="ph-fill ph-basket text-4xl text-primary"></i>
                    <span class="brand-font font-bold text-3xl text-gray-900 tracking-tight">Quick<span class="text-primary">Grab</span></span>
                </a>
                <h2 class="text-2xl font-bold text-gray-900">Create an account</h2>
                <p class="text-gray-500 mt-1">Start shopping for fresh groceries today.</p>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
                <form id="register-form" class="space-y-5">
                    <div id="error-msg" class="hidden bg-red-50 text-red-600 text-sm p-3 rounded-lg border border-red-100"></div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="ph ph-user text-gray-400 text-lg"></i>
                            </div>
                            <input type="text" id="name" required class="block w-full pl-10 pr-3 py-2.5 border border-gray-300 rounded-xl focus:ring-primary focus:border-primary sm:text-sm transition-colors" placeholder="John Doe">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="ph ph-envelope text-gray-400 text-lg"></i>
                            </div>
                            <input type="email" id="email" required class="block w-full pl-10 pr-3 py-2.5 border border-gray-300 rounded-xl focus:ring-primary focus:border-primary sm:text-sm transition-colors" placeholder="you@example.com">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="ph ph-lock text-gray-400 text-lg"></i>
                            </div>
                            <input type="password" id="password" required class="block w-full pl-10 pr-3 py-2.5 border border-gray-300 rounded-xl focus:ring-primary focus:border-primary sm:text-sm transition-colors" placeholder="••••••••">
                        </div>
                        <p class="mt-1 text-xs text-gray-500">Must be at least 6 characters long.</p>
                    </div>

                    <button type="submit" id="submit-btn" class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-medium text-white bg-primary hover:bg-primary-light focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors mt-6">
                        Create Account
                    </button>
                </form>

                <div class="mt-6 text-center text-sm">
                    <p class="text-gray-600">Already have an account? <a href="login.html" class="font-medium text-primary hover:text-primary-light">Sign in</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        // Redirect if already logged in
        if(AuthAPI.getCurrentUser()) {
            window.location.href = 'index.html';
        }

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const errorMsg = document.getElementById('error-msg');
            
            btn.disabled = true;
            btn.innerHTML = '<div class="loader mr-2"></div> Creating...';
            errorMsg.classList.add('hidden');

            try {
                const name = document.getElementById('name').value;
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                const response = await AuthAPI.register({ name, email, password });
                
                // Assuming backend returns { token, user } or similar structure
                localStorage.setItem('token', response.token);
                localStorage.setItem('user', JSON.stringify(response.user || response.data));
                
                window.location.href = 'index.html';
            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.classList.remove('hidden');
                btn.disabled = false;
                btn.innerHTML = 'Create Account';
            }
        });
    </script>
</body>
</html>
