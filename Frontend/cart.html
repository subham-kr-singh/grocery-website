<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | QuickGrab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2d6a4f',
                        'primary-light': '#40916c',
                        accent: '#d8f3dc'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <!-- Navigation -->
    <nav class="glass sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2">
                    <i class="ph-fill ph-basket text-3xl text-primary"></i>
                    <a href="index.html" class="brand-font font-bold text-2xl text-gray-900">Quick<span class="text-primary">Grab</span></a>
                </div>
                
                <div class="flex items-center gap-4">
                    <a href="index.html" class="text-sm font-medium text-gray-700 hover:text-primary transition-colors">Back to Shop</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full">
        <h1 class="text-3xl font-bold text-gray-900 mb-8 brand-font">Your Cart</h1>

        <div class="flex flex-col lg:flex-row gap-8">
            
            <!-- Cart Items -->
            <div class="lg:w-2/3">
                <div id="cart-container" class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    <!-- Items injected here -->
                </div>
            </div>

            <!-- Order Summary -->
            <div class="lg:w-1/3">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 sticky top-24">
                    <h2 class="text-xl font-bold text-gray-900 mb-4 brand-font">Order Summary</h2>
                    
                    <div class="space-y-3 mb-6 text-sm">
                        <div class="flex justify-between text-gray-600">
                            <span>Subtotal</span>
                            <span id="subtotal-amount" class="font-medium text-gray-900">$0.00</span>
                        </div>
                        <div class="flex justify-between text-gray-600">
                            <span>Delivery Fee</span>
                            <span id="delivery-fee" class="font-medium text-gray-900">$5.00</span>
                        </div>
                        <div class="border-t border-gray-100 pt-3 flex justify-between items-center">
                            <span class="text-base font-bold text-gray-900">Total</span>
                            <span id="total-amount" class="text-2xl font-bold text-primary">$0.00</span>
                        </div>
                    </div>

                    <div id="error-msg" class="hidden mb-4 bg-red-50 text-red-600 text-sm p-3 rounded-lg border border-red-100"></div>

                    <button id="checkout-btn" class="w-full flex justify-center items-center py-3 px-4 rounded-xl shadow-sm text-sm font-medium text-white bg-primary hover:bg-primary-light transition-colors active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                        Place Order
                    </button>
                    <p class="text-xs text-center text-gray-500 mt-4">By placing your order, you agree to our Terms of Service and Privacy Policy.</p>
                </div>
            </div>

        </div>
    </main>

    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderCart();
            window.addEventListener('cartUpdated', renderCart);

            document.getElementById('checkout-btn').addEventListener('click', async () => {
                const user = AuthAPI.getCurrentUser();
                const errorMsg = document.getElementById('error-msg');
                errorMsg.classList.add('hidden');

                if (!user) {
                    window.location.href = 'login.html';
                    return;
                }

                const cart = CartLogic.getCart();
                if (cart.length === 0) return;

                const btn = document.getElementById('checkout-btn');
                btn.disabled = true;
                btn.innerHTML = '<div class="loader mr-2"></div> Processing...';

                try {
                    // Backend order model expects: items[].productId and items[].quantity
                    // totalAmount is calculated server-side from live product prices
                    const orderItems = cart.map(item => ({
                        productId: item._id,
                        quantity: item.quantity
                    }));

                    await OrdersAPI.create({ items: orderItems });
                    
                    CartLogic.clearCart();
                    
                    // Show success state
                    document.querySelector('main').innerHTML = `
                        <div class="flex flex-col items-center justify-center py-20 animate-fade-in">
                            <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mb-6">
                                <i class="ph ph-check text-4xl text-green-500"></i>
                            </div>
                            <h2 class="text-3xl font-bold text-gray-900 mb-2 brand-font">Order Placed Successfully!</h2>
                            <p class="text-gray-500 mb-8 text-center max-w-md">Thank you for shopping with QuickGrab. You can track your order status in the My Orders section.</p>
                            <a href="orders.html" class="inline-flex items-center justify-center py-3 px-6 rounded-xl text-sm font-medium text-white bg-primary hover:bg-primary-light transition-colors">
                                View My Orders
                            </a>
                        </div>
                    `;

                } catch (error) {
                    errorMsg.textContent = error.message;
                    errorMsg.classList.remove('hidden');
                    btn.disabled = false;
                    btn.innerHTML = 'Place Order';
                }
            });
        });

        function renderCart() {
            const container = document.getElementById('cart-container');
            const cart = CartLogic.getCart();
            const btn = document.getElementById('checkout-btn');

            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="p-12 text-center">
                        <i class="ph ph-shopping-cart text-5xl text-gray-300 mb-4 inline-block"></i>
                        <h3 class="text-lg font-medium text-gray-900 mb-1">Your cart is empty</h3>
                        <p class="text-gray-500 mb-6">Looks like you haven't added anything yet.</p>
                        <a href="index.html" class="text-primary font-medium hover:underline">Start Shopping</a>
                    </div>
                `;
                document.getElementById('subtotal-amount').innerText = '$0.00';
                document.getElementById('total-amount').innerText = '$0.00';
                btn.disabled = true;
                return;
            }

            btn.disabled = false;
            let html = '<ul class="divide-y divide-gray-100">';
            let subtotal = 0;

            cart.forEach(item => {
                subtotal += item.price * item.quantity;
                const imgUrl = item.imageURL || `https://source.unsplash.com/100x100/?${item.category.toLowerCase()}`;
                
                html += `
                    <li class="p-6 flex flex-col sm:flex-row gap-6 items-center hover:bg-gray-50 transition-colors">
                        <img src="${imgUrl}" alt="${item.name}" class="w-20 h-20 object-cover rounded-xl border border-gray-100 flex-shrink-0" onerror="this.src='https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&q=80&w=100'">
                        
                        <div class="flex-grow text-center sm:text-left">
                            <h4 class="text-base font-bold text-gray-900 mb-1">${item.name}</h4>
                            <p class="text-sm text-gray-500 mb-2">${item.category}</p>
                            <div class="text-primary font-bold text-lg">$${item.price.toFixed(2)}</div>
                        </div>

                        <div class="flex items-center gap-4">
                            <div class="flex items-center bg-gray-100 rounded-lg p-1">
                                <button onclick="updateQty('${item._id}', ${item.quantity - 1})" class="w-8 h-8 flex items-center justify-center text-gray-600 hover:bg-white hover:shadow-sm rounded transition-all">
                                    <i class="ph ph-minus"></i>
                                </button>
                                <span class="w-10 text-center font-medium text-sm text-gray-900">${item.quantity}</span>
                                <button onclick="updateQty('${item._id}', ${item.quantity + 1})" class="w-8 h-8 flex items-center justify-center text-gray-600 hover:bg-white hover:shadow-sm rounded transition-all">
                                    <i class="ph ph-plus"></i>
                                </button>
                            </div>
                            <button onclick="removeItem('${item._id}')" class="text-red-500 hover:bg-red-50 p-2 rounded-lg transition-colors" title="Remove item">
                                <i class="ph ph-trash text-xl"></i>
                            </button>
                        </div>
                    </li>
                `;
            });
            
            html += '</ul>';
            container.innerHTML = html;

            document.getElementById('subtotal-amount').innerText = `$${subtotal.toFixed(2)}`;
            document.getElementById('total-amount').innerText = `$${(subtotal + 5).toFixed(2)}`;
        }

        window.updateQty = (id, newQty) => {
            CartLogic.updateQuantity(id, newQty);
        };
        
        window.removeItem = (id) => {
            CartLogic.removeFromCart(id);
        };
    </script>
</body>
</html>
